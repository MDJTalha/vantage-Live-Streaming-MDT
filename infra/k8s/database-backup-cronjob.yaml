---
# Kubernetes CronJob for Automated Database Backups
apiVersion: batch/v1
kind: CronJob
metadata:
  name: database-backup
  namespace: vantage
spec:
  # Run daily at 2 AM UTC
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: database-backup
        spec:
          serviceAccountName: vantage
          restartPolicy: OnFailure
          
          containers:
          - name: backup
            image: postgres:15-alpine
            command:
            - /bin/sh
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              BACKUP_FILE="/backups/vantage_db_$TIMESTAMP.sql.gz"
              
              echo "[$(date)] Starting database backup..."
              pg_dump \
                --host=postgres.vantage.svc.cluster.local \
                --username=vantage \
                --format=plain \
                vantage | gzip > $BACKUP_FILE
              
              echo "[$(date)] Backup completed: $BACKUP_FILE"
              ls -lh $BACKUP_FILE
              
              # Upload to S3 if configured
              if command -v aws &> /dev/null; then
                aws s3 cp $BACKUP_FILE s3://$S3_BACKUP_BUCKET/
                echo "[$(date)] Uploaded to S3"
              fi
              
              # Cleanup old backups (keep last 30 days)
              find /backups -name "vantage_db_*.sql.gz" -mtime +30 -delete
              
              echo "[$(date)] Backup completed successfully"
            
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: vantage-secrets
                  key: postgres-password
            - name: S3_BACKUP_BUCKET
              value: vantage-backups
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: vantage-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: vantage-secrets
                  key: aws-secret-access-key
            
            volumeMounts:
            - name: backups
              mountPath: /backups
            
            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "1Gi"
                cpu: "500m"
          
          volumes:
          - name: backups
            persistentVolumeClaim:
              claimName: backup-pvc

---
# PersistentVolumeClaim for Backups
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: vantage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 100Gi

---
# ServiceAccount for CronJob
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vantage
  namespace: vantage

---
# Role for backup operations
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vantage-backup
  namespace: vantage
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vantage-backup
  namespace: vantage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vantage-backup
subjects:
- kind: ServiceAccount
  name: vantage
  namespace: vantage
