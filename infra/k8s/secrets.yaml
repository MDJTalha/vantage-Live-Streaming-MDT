apiVersion: v1
kind: Secret
metadata:
  name: vantage-secrets
  namespace: vantage
type: Opaque
stringData:
  # IMPORTANT: Replace all values with your actual production secrets
  # NEVER commit real secrets to version control
  # Use sealed-secrets or HashiCorp Vault in production
  
  # Database connection string
  database-url: postgresql://vantage:CHANGE_ME_SECURE_PASSWORD@postgres.vantage.svc.cluster.local:5432/vantage
  
  # Redis connection string with password
  redis-url: redis://:CHANGE_ME_SECURE_PASSWORD@redis.vantage.svc.cluster.local:6379
  
  # JWT Secret for token signing (generate with: openssl rand -base64 32)
  jwt-secret: CHANGE_ME_GENERATE_RANDOM_32_CHAR_SECRET
  
  # Encryption key for sensitive data (must be 32 bytes)
  encryption-key: CHANGE_ME_32_BYTE_ENCRYPTION_KEY_EXACT_LENGTH
  
  # OpenAI API key
  openai-api-key: sk-CHANGE_ME_WITH_YOUR_OPENAI_KEY
  
  # TURN server credentials
  turn-server-url: turn:turn.vantage.example.com:3478
  turn-server-username: vantage_user
  turn-server-password: CHANGE_ME_SECURE_TURN_PASSWORD
  
  # AWS credentials (if using S3)
  aws-access-key-id: CHANGE_ME_YOUR_AWS_KEY
  aws-secret-access-key: CHANGE_ME_YOUR_AWS_SECRET
  aws-region: us-east-1
  
  # SMTP credentials for email
  smtp-host: smtp.gmail.com
  smtp-port: "587"
  smtp-user: noreply@vantage.example.com
  smtp-pass: CHANGE_ME_APP_PASSWORD

---
# Instructions for Production:
#
# 1. Generate secure random values:
#    JWT_SECRET: openssl rand -base64 32
#    ENCRYPTION_KEY: openssl rand -hex 16  (32 character hex string)
#
# 2. Use a secrets management system:
#    - HashiCorp Vault
#    - AWS Secrets Manager
#    - sealed-secrets (https://sealed-secrets.netlify.app/)
#
# 3. Never store secrets in Git:
#    - Add secrets.yaml to .gitignore
#    - Use templated secrets in CI/CD
#    - Rotate secrets regularly
#
# 4. Apply secrets to cluster:
#    kubectl create secret generic vantage-secrets \
#      --from-literal=database-url="$DB_URL" \
#      --from-literal=redis-url="$REDIS_URL" \
#      -n vantage
