name: vantage_mobile
description: VANTAGE - Your Stage, Everywhere. Mobile app for iOS and Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & State Management
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # WebRTC & Video
  flutter_webrtc: ^0.11.5
  mediasoup_client_flutter: ^0.1.0

  # Networking
  socket_io_client: ^2.0.3+1
  http: ^1.2.0
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Authentication
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^5.0.0

  # Push Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  flutter_local_notifications: ^16.3.2

  # Permissions
  permission_handler: ^11.2.0
  flutter_background_service: ^5.0.5

  # Media
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  microphone: ^0.1.0

  # Utilities
  url_launcher: ^6.2.4
  package_info_plus: ^5.0.1
  connectivity_plus: ^5.0.2
  device_info_plus: ^9.1.1
  flutter_native_splash: ^3.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/

  fonts:
    - family: VantageIcons
      fonts:
        - asset: assets/fonts/VantageIcons.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_icon.png"
  adaptive_icon_background: "#1e3a8a"
  adaptive_icon_foreground: "assets/logo/app_icon_foreground.png"

flutter_native_splash:
  color: "#1e3a8a"
  image: assets/logo/splash_logo.png
  android: true
  ios: true
  web: false
