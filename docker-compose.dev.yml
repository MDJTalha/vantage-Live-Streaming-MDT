version: '3.8'

services:
  # Frontend (Next.js)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: vantage-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - /app/node_modules
    depends_on:
      - api
    networks:
      - vantage-network

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api.dev
    container_name: vantage-api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://vantage:dev_password_change_me@postgres:5432/vantage?schema=public
      - REDIS_URL=redis://:dev_redis_password_change_me@redis:6379
      - JWT_SECRET=vantage_dev_jwt_secret_key_change_in_production_32chars
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/apps/api/node_modules
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - vantage-network

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: vantage-postgres-dev
    environment:
      POSTGRES_USER: vantage
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: vantage
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - vantage-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: vantage-redis-dev
    command: redis-server --appendonly yes --requirepass dev_redis_password_change_me
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - vantage-network

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  vantage-network:
    driver: bridge
