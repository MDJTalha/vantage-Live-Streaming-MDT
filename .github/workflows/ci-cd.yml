name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Stage 1: Lint & Test
  # ============================================
  lint-and-test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vantage
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: vantage_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.13.0'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: cd apps/web && npm run lint

    - name: Run tests
      env:
        DATABASE_URL: postgresql://vantage:test_pass@localhost:5432/vantage_test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-secret-key
        ENCRYPTION_KEY: 12345678901234567890123456789012
      run: cd apps/web && npm run test

    - name: Build check
      run: cd apps/web && npm run build

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/lcov.info
        fail_ci_if_error: false

  # ============================================
  # Stage 2: Security Scanning
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.13.0'

    - name: Run npm audit
      run: npm audit --production --audit-level=moderate
      continue-on-error: true

  # ============================================
  # Stage 3: Build & Push Docker Images
  # ============================================
  build-and-push:
    name: Build Docker Images
    needs: [lint-and-test, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api, web, media-server, ai-services]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=sha,prefix=${{ matrix.service }}-
          type=semver,pattern={{version}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: apps/${{ matrix.service }}/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy vulnerability scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ matrix.service }}-sha-${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results.sarif'
        exit-code: '0'
      continue-on-error: true

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

  # ============================================
  # Stage 4: Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Deploy to Staging
      run: |
        kubectl apply -f infra/k8s/namespace.yaml -n vantage
        kubectl apply -f infra/k8s/secrets.yaml -n vantage
        kubectl apply -f infra/k8s/api-deployment.yaml -n vantage
        kubectl apply -f infra/k8s/web-deployment.yaml -n vantage
        kubectl apply -f infra/k8s/ingress.yaml -n vantage

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/api -n vantage --timeout=5m
        kubectl rollout status deployment/web -n vantage --timeout=5m

    - name: Run smoke tests
      run: |
        # Wait for service to be ready
        sleep 30
        curl -f https://api-staging.vantage.example.com/health || exit 1
        curl -f https://staging.vantage.example.com/api/health || exit 1
      continue-on-error: true

  # ============================================
  # Stage 5: Deploy to Production (with approval)
  # ============================================
  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://vantage.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Deploy to Production
      run: |
        kubectl apply -f infra/k8s/namespace.yaml -n vantage
        kubectl apply -f infra/k8s/secrets.yaml -n vantage --validate=false  # Secrets pre-exist
        kubectl apply -f infra/k8s/api-deployment.yaml -n vantage
        kubectl apply -f infra/k8s/web-deployment.yaml -n vantage
        kubectl apply -f infra/k8s/ingress.yaml -n vantage

    - name: Verify deployment health
      run: |
        kubectl rollout status deployment/api -n vantage --timeout=10m
        kubectl rollout status deployment/web -n vantage --timeout=10m
        sleep 30
        curl -f https://api.vantage.example.com/health || exit 1
        curl -f https://vantage.example.com/api/health || exit 1

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          Production deployment completed successfully
          Commit: ${{ github.sha }}
        draft: false
        prerelease: false

    - name: Notify deployment complete
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: context.payload.deployment.id,
            state: 'success',
            environment_url: 'https://vantage.example.com',
            description: 'Production deployment successful'
          });
      continue-on-error: true
