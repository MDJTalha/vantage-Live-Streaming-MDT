version: '3.8'

# Production Docker Compose for VANTAGE Executive Platform
# High Availability configuration for Fortune 500 infrastructure

services:
  # ==================== LOAD BALANCER ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: vantage-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/ssl/certs:ro
      - ./infra/nginx/logs:/var/log/nginx
    depends_on:
      - web-1
      - web-2
      - api-1
      - api-2
    networks:
      - vantage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== FRONTEND (2 instances) ====================
  web-1:
    build:
      context: ./apps/web
      dockerfile: ../../Dockerfile.web
    container_name: vantage-web-1
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api-1:4000
      - NEXT_PUBLIC_WS_URL=ws://api-1:4000
    depends_on:
      - api-1
    networks:
      - vantage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web-2:
    build:
      context: ./apps/web
      dockerfile: ../../Dockerfile.web
    container_name: vantage-web-2
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api-2:4000
      - NEXT_PUBLIC_WS_URL=ws://api-2:4000
    depends_on:
      - api-2
    networks:
      - vantage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== API (2 instances) ====================
  api-1:
    build:
      context: ./apps/api
      dockerfile: ../../Dockerfile
    container_name: vantage-api-1
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://vantage:${DB_PASSWORD}@postgres-primary:5432/vantage
      - REDIS_URL=redis://redis-primary:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres-primary
      - redis-primary
    networks:
      - vantage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-2:
    build:
      context: ./apps/api
      dockerfile: ../../Dockerfile
    container_name: vantage-api-2
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://vantage:${DB_PASSWORD}@postgres-replica:5432/vantage
      - REDIS_URL=redis://redis-primary:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres-replica
      - redis-primary
    networks:
      - vantage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== DATABASE (Primary + Replica) ====================
  postgres-primary:
    image: postgres:16-alpine
    container_name: vantage-postgres-primary
    environment:
      - POSTGRES_DB=vantage
      - POSTGRES_USER=vantage
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - vantage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vantage"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:16-alpine
    container_name: vantage-postgres-replica
    environment:
      - POSTGRES_DB=vantage
      - POSTGRES_USER=vantage
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    depends_on:
      - postgres-primary
    networks:
      - vantage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vantage"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== REDIS (Cache & Sessions) ====================
  redis-primary:
    image: redis:7-alpine
    container_name: vantage-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - vantage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== MEDIA SERVER (WebRTC SFU) ====================
  mediasoup:
    build:
      context: ./apps/media-server
      dockerfile: ../../Dockerfile
    container_name: vantage-mediasoup
    ports:
      - "4443:4443"
      - "10000-10100:10000-10100/udp"
    environment:
      - NODE_ENV=production
      - MEDIASOUP_LISTEN_IP=0.0.0.0
      - MEDIASOUP_ANNOUNCED_IP=${PUBLIC_IP}
    networks:
      - vantage-network
    restart: unless-stopped

  # ==================== COTURN (STUN/TURN Server) ====================
  coturn:
    image: coturn/coturn:latest
    container_name: vantage-coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "10000-10100:10000-10100/udp"
    command:
      - -n
      - --log-file=stdout
      - --realm=vantage.live
      - --listening-ip=0.0.0.0
      - --external-ip=${PUBLIC_IP}
      - --min-port=10000
      - --max-port=10100
      - --user=vantage:${TURN_PASSWORD}
      - --lt-cred-mech
    networks:
      - vantage-network
    restart: unless-stopped

  # ==================== MONITORING ====================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: vantage-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - vantage-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.1.0
    container_name: vantage-grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana.ini:/etc/grafana/grafana.ini:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - vantage-network
    restart: unless-stopped

networks:
  vantage-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres-primary-data:
  postgres-replica-data:
  redis-data:
  prometheus-data:
  grafana-data:
