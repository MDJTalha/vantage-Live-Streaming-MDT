# Alertmanager Configuration
# VANTAGE Platform Alert Routing

global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_HOST:-smtp.gmail.com:587}'
  smtp_from: '${SMTP_FROM:-alerts@vantage.live}'
  smtp_auth_username: '${SMTP_USER:-}'
  smtp_auth_password: '${SMTP_PASS:-}'

# Templates for alert messages
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routing tree
route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
      group_wait: 10s
      repeat_interval: 1h
    
    # Database alerts
    - match:
        service: 'postgres'
      receiver: 'database-team'
      group_wait: 1m
    
    # Security alerts
    - match:
        service: 'security'
      receiver: 'security-team'
      group_wait: 1m
      repeat_interval: 2h
    
    # Media server alerts
    - match:
        service: 'vantage-media-server'
      receiver: 'media-team'
      group_wait: 1m

# Inhibition rules - suppress lower severity alerts
inhibit_rules:
  # If service is down, suppress all other alerts for that service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

# Receivers
receivers:
  # Default receiver - email
  - name: 'default-receiver'
    email_configs:
      - to: '${ALERT_EMAIL:-admin@vantage.live}'
        send_resolved: true
        html: '{{ template "email.default.html" . }}'

  # Critical alerts - email + PagerDuty
  - name: 'critical-alerts'
    email_configs:
      - to: '${CRITICAL_ALERT_EMAIL:-oncall@vantage.live}'
        send_resolved: true
        html: '{{ template "email.critical.html" . }}'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY:-}'
        severity: critical
        description: '{{ template "pagerduty.default.description" . }}'

  # Database team
  - name: 'database-team'
    email_configs:
      - to: '${DB_TEAM_EMAIL:-dba@vantage.live}'
        send_resolved: true

  # Security team
  - name: 'security-team'
    email_configs:
      - to: '${SECURITY_TEAM_EMAIL:-security@vantage.live}'
        send_resolved: true
    webhook_configs:
      - url: '${SECURITY_WEBHOOK_URL:-}'
        send_resolved: true

  # Media team
  - name: 'media-team'
    email_configs:
      - to: '${MEDIA_TEAM_EMAIL:-media@vantage.live}'
        send_resolved: true

